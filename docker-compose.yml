services:
  postgres:
    image: postgres:16
    container_name: ir_postgres
    environment:
      POSTGRES_DB: ir_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASSWORD:-12345678}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ir_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: ir_app
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ir_db
      PGUSER: postgres
      PGPASSWORD: ${PGPASSWORD:-12345678}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persisted index/model artifacts (TF-IDF, BM25, Embedding .joblib files).
      - ./data_store:/app/data_store
      # Cache directories so heavy downloads (datasets / models) survive container restarts.
      - ir_datasets_cache:/root/.ir_datasets
      - hf_cache:/root/.cache/huggingface
      - nltk_data:/root/nltk_data
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pg_data:
  ir_datasets_cache:
  hf_cache:
  nltk_data:
